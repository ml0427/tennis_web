logging:
  level:
    org.springframework.security: DEBUG

spring:
  datasource:
    url: jdbc:h2:file:./data/tennis_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never
      platform: h2
      continue-on-error: true
  mvc:
    static-path-pattern: /**
  security:
    cors:
      allowed-origins: http://localhost:8080
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      exposed-headers:
        - Authorization

server:
  port: 8081
